<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARTIFICIAL INTELLIGENCE</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #050510; }
  body {
    font-family: 'Courier New', 'Consolas', 'Monaco', monospace;
    cursor: crosshair;
  }
  canvas { display: block; position: absolute; top: 0; left: 0; }

  #title {
    position: fixed; top: 28px; left: 50%; transform: translateX(-50%);
    color: rgba(0,220,255,0.8); font-size: 24px; letter-spacing: 6px;
    pointer-events: none; z-index: 10;
    text-shadow: 0 0 40px rgba(0,180,255,0.6), 0 0 80px rgba(0,140,240,0.3);
  }
  #subtitle {
    position: fixed; top: 64px; left: 50%; transform: translateX(-50%);
    color: rgba(180,140,255,0.5); font-size: 11px; letter-spacing: 3px;
    pointer-events: none; z-index: 10;
  }
  #hint {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    color: rgba(100,180,220,0.45); font-size: 13px; pointer-events: none; z-index: 10;
    letter-spacing: 2px;
  }
  #info {
    position: fixed; top: 100px; right: 28px;
    color: rgba(100,180,220,0.4); font-size: 11px; pointer-events: none; z-index: 10;
    text-align: right; line-height: 1.9;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title">ARTIFICIAL INTELLIGENCE</div>
<div id="subtitle">NEURAL NETWORK VISUALIZATION</div>
<div id="hint">hover &middot; click &middot; scroll &mdash; explore the network</div>
<div id="info"></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const info = document.getElementById('info');

let W, H, mouseX = -100, mouseY = -100, mouseDown = false, scrollDepth = 0;
let time = 0;
const TWO_PI = Math.PI * 2;
const MATH_SYMBOLS = ['σ','Σ','∇','∫','∂','θ','ω','α','β','π','λ','μ','Δ','Ω','ε','φ','γ','η','ξ','∞','⊗','⊕','⊂','∀','∃','≈'];
let fps = 60, frameCount = 0, lastFpsTime = performance.now();

// --- Resize ---
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  buildNetwork();
}
window.addEventListener('resize', resize);

// --- Mouse / Touch ---
canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
canvas.addEventListener('mousedown', () => mouseDown = true);
canvas.addEventListener('mouseup', () => mouseDown = false);
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  mouseX = e.touches[0].clientX;
  mouseY = e.touches[0].clientY;
  mouseDown = true;
});
canvas.addEventListener('touchend', () => mouseDown = false);
canvas.addEventListener('wheel', e => {
  scrollDepth = Math.max(-1, Math.min(1, scrollDepth - e.deltaY * 0.001));
  buildNetwork();
});

// =================== NETWORK ===================
const LAYER_CONFIG = [
  { name: 'Input Layer',    neurons: 4, color: [0,   200, 255] },  // cyan
  { name: 'Hidden Layer 1', neurons: 8, color: [80,  140, 255] },  // blue
  { name: 'Hidden Layer 2', neurons: 8, color: [140, 100, 255] },  // purple-blue
  { name: 'Hidden Layer 3', neurons: 6, color: [200, 80,  255] },  // purple
  { name: 'Output Layer',   neurons: 3, color: [255, 100, 180] },  // pink
];

let neurons = [];
let connections = [];
let dataParticles = [];
let bgSymbols = [];
let signalPulses = [];
let sparkles = [];

function buildNetwork() {
  neurons = [];
  connections = [];
  dataParticles = [];
  signalPulses = [];
  sparkles = [];
  const layerCount = LAYER_CONFIG.length;
  const totalWidth = W * (0.75 + scrollDepth * 0.1);
  const startX = (W - totalWidth) / 2;
  const layerSpacing = totalWidth / (layerCount - 1);

  LAYER_CONFIG.forEach((cfg, li) => {
    const cx = startX + li * layerSpacing;
    const layerHeight = H * (0.6 + scrollDepth * 0.15);
    const startY = (H - layerHeight) / 2;
    const neuronSpacing = cfg.neurons > 1 ? layerHeight / (cfg.neurons - 1) : 0;

    for (let ni = 0; ni < cfg.neurons; ni++) {
      const cy = startY + ni * neuronSpacing;
      neurons.push({
        x: cx, y: cy, layer: li, index: ni,
        baseColor: cfg.color,
        radius: 6 + Math.random() * 2,
        activation: 0,
        pulsePhase: Math.random() * TWO_PI,
        bias: Math.random() * 0.3,
        id: `${li}-${ni}`,
        hovered: false,
        firing: false,
        fireTimer: 0,
        glowRadius: 0,
      });
    }
  });

  // Build connections
  for (let li = 0; li < layerCount - 1; li++) {
    const srcNeurons = neurons.filter(n => n.layer === li);
    const dstNeurons = neurons.filter(n => n.layer === li + 1);
    srcNeurons.forEach(src => {
      dstNeurons.forEach(dst => {
        connections.push({
          from: src, to: dst,
          weight: (Math.random() - 0.3) * 2, // visual weight
          opacity: 0.08 + Math.random() * 0.12,
          particleTimer: Math.random() * 300,
          particleInterval: 80 + Math.random() * 220,
        });
      });
    });
  }

  // Ensure background symbols
  if (bgSymbols.length < 40) {
    while (bgSymbols.length < 40) {
      bgSymbols.push({
        x: Math.random() * W,
        y: Math.random() * H,
        symbol: MATH_SYMBOLS[Math.floor(Math.random() * MATH_SYMBOLS.length)],
        size: 10 + Math.random() * 20,
        opacity: 0.03 + Math.random() * 0.06,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.25 - 0.1,
        rotation: Math.random() * TWO_PI,
        rotSpeed: (Math.random() - 0.5) * 0.005,
      });
    }
  }
}

// =================== SIGNAL PULSE ===================
class SignalPulse {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    this.radius = 4;
    this.maxRadius = 30 + Math.random() * 25;
    this.life = 1;
    this.color = color;
  }
  update() {
    this.radius += 1.2;
    this.life -= 0.025;
  }
  draw(ctx) {
    if (this.life <= 0) return;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, TWO_PI);
    ctx.strokeStyle = `rgba(${this.color[0]},${this.color[1]},${this.color[2]},${this.life * 0.6})`;
    ctx.lineWidth = 1.5 * this.life;
    ctx.stroke();
  }
  get alive() { return this.life > 0; }
}

// =================== SPARKLE ===================
class Sparkle {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    this.vx = (Math.random() - 0.5) * 2.5;
    this.vy = (Math.random() - 0.5) * 2.5 - 1.5;
    this.life = 1;
    this.decay = 0.015 + Math.random() * 0.04;
    this.size = 0.8 + Math.random() * 2;
    this.color = color;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.life -= this.decay;
  }
  draw(ctx) {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, TWO_PI);
    ctx.fillStyle = `rgba(${this.color[0]},${this.color[1]},${this.color[2]},${this.life})`;
    ctx.fill();
  }
  get alive() { return this.life > 0; }
}

// =================== DATA PARTICLE ===================
class DataParticle {
  constructor(conn) {
    this.conn = conn;
    this.progress = 0;
    this.speed = 0.003 + Math.random() * 0.008;
    this.size = 1.2 + Math.random() * 1.8;
    this.brightness = 0.5 + Math.random() * 0.5;
  }
  update() {
    this.progress += this.speed;
  }
  draw(ctx) {
    if (this.progress >= 1) return;
    const t = this.progress;
    // Ease in-out
    const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    const x = this.conn.from.x + (this.conn.to.x - this.conn.from.x) * eased;
    const y = this.conn.from.y + (this.conn.to.y - this.conn.from.y) * eased;
    const alpha = this.brightness * (1 - Math.abs(t - 0.5) * 2);

    // Glow
    ctx.beginPath();
    ctx.arc(x, y, this.size * 2.5, 0, TWO_PI);
    const glowGrad = ctx.createRadialGradient(x, y, 0, x, y, this.size * 2.5);
    glowGrad.addColorStop(0, `rgba(255,200,100,${alpha * 0.5})`);
    glowGrad.addColorStop(1, 'rgba(255,200,100,0)');
    ctx.fillStyle = glowGrad;
    ctx.fill();

    // Core
    ctx.beginPath();
    ctx.arc(x, y, this.size, 0, TWO_PI);
    ctx.fillStyle = `rgba(255,220,140,${alpha})`;
    ctx.fill();
  }
  get done() { return this.progress >= 1; }
}

// =================== FIRE SIGNAL ===================
function fireSignal(startNeuron) {
  // Forward propagate through the network
  const visited = new Set();
  const queue = [{ neuron: startNeuron, depth: 0, delay: 0 }];
  visited.add(startNeuron.id);

  while (queue.length > 0) {
    const { neuron, depth, delay } = queue.shift();

    setTimeout(() => {
      neuron.activation = 1;
      neuron.firing = true;
      neuron.fireTimer = 30;
      signalPulses.push(new SignalPulse(neuron.x, neuron.y, neuron.baseColor));
      // Sparkles
      for (let i = 0; i < 5; i++) {
        sparkles.push(new Sparkle(neuron.x, neuron.y, neuron.baseColor));
      }
    }, delay);

    // Find connections from this neuron to next layer
    const outConns = connections.filter(c => c.from.id === neuron.id);
    outConns.forEach(conn => {
      if (!visited.has(conn.to.id)) {
        visited.add(conn.to.id);
        // Spawn data particle burst
        for (let i = 0; i < 3; i++) {
          const p = new DataParticle(conn);
          p.progress = 0;
          p.speed = 0.02 + Math.random() * 0.03;
          p.size = 1.5 + Math.random() * 2;
          p.brightness = 0.8 + Math.random() * 0.2;
          dataParticles.push(p);
        }
        queue.push({ neuron: conn.to, depth: depth + 1, delay: delay + 200 + Math.random() * 150 });
      }
    });
  }
}

// =================== INIT ===================
resize();

// =================== RENDER LOOP ===================
function draw() {
  time++;

  // FPS counter
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    fps = Math.round(frameCount / ((now - lastFpsTime) / 1000));
    frameCount = 0;
    lastFpsTime = now;
  }

  // --- Background ---
  const bgGrad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.7);
  bgGrad.addColorStop(0, '#0a0a24');
  bgGrad.addColorStop(0.5, '#060618');
  bgGrad.addColorStop(1, '#020210');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = 'rgba(30,40,80,0.12)';
  ctx.lineWidth = 0.5;
  const gridSize = 50;
  for (let gx = gridSize; gx < W; gx += gridSize) {
    ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke();
  }
  for (let gy = gridSize; gy < H; gy += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
  }

  // --- Background Math Symbols ---
  bgSymbols.forEach(s => {
    s.x += s.vx;
    s.y += s.vy;
    s.rotation += s.rotSpeed;
    if (s.x < -50) s.x = W + 50;
    if (s.x > W + 50) s.x = -50;
    if (s.y < -50) s.y = H + 50;
    if (s.y > H + 50) { s.y = -50; s.x = Math.random() * W; }

    ctx.save();
    ctx.globalAlpha = s.opacity;
    ctx.translate(s.x, s.y);
    ctx.rotate(s.rotation);
    ctx.font = `${s.size}px "Courier New", monospace`;
    ctx.fillStyle = '#4060a0';
    ctx.fillText(s.symbol, 0, 0);
    ctx.restore();
  });

  // --- Find hovered neuron ---
  let hoveredNeuron = null;
  let closestDist = 50;
  neurons.forEach(n => {
    const dx = mouseX - n.x;
    const dy = mouseY - n.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < closestDist) {
      closestDist = dist;
      hoveredNeuron = n;
    }
    n.hovered = false;
  });
  if (hoveredNeuron) {
    hoveredNeuron.hovered = true;
    // Subtle activation on hover
    hoveredNeuron.activation = Math.min(1, hoveredNeuron.activation + 0.03);
  }

  // --- Update neurons ---
  neurons.forEach(n => {
    // Decay activation
    if (!n.hovered) {
      n.activation *= 0.95;
    }
    // Fire decay
    if (n.firing) {
      n.fireTimer--;
      if (n.fireTimer <= 0) {
        n.firing = false;
        n.activation = Math.max(0.15, n.activation);
      }
    }
    // Pulse
    n.pulsePhase += 0.04;
    // Glow radius
    n.glowRadius = n.activation * 20 + Math.sin(n.pulsePhase + n.bias * 10) * 3;
  });

  // --- Spawn data particles ---
  connections.forEach(conn => {
    conn.particleTimer++;
    if (conn.particleTimer > conn.particleInterval) {
      conn.particleTimer = 0;
      conn.particleInterval = 80 + Math.random() * 220;
      dataParticles.push(new DataParticle(conn));
    }
  });

  // --- Update data particles ---
  for (let i = dataParticles.length - 1; i >= 0; i--) {
    dataParticles[i].update();
    if (dataParticles[i].done) dataParticles.splice(i, 1);
  }
  // Cap particles
  if (dataParticles.length > 600) {
    dataParticles.splice(0, dataParticles.length - 600);
  }

  // --- Update signal pulses ---
  for (let i = signalPulses.length - 1; i >= 0; i--) {
    signalPulses[i].update();
    if (!signalPulses[i].alive) signalPulses.splice(i, 1);
  }

  // --- Update sparkles ---
  for (let i = sparkles.length - 1; i >= 0; i--) {
    sparkles[i].update();
    if (!sparkles[i].alive) sparkles.splice(i, 1);
  }

  // --- DRAW CONNECTIONS ---
  connections.forEach(conn => {
    const srcAct = conn.from.activation;
    const dstAct = conn.to.activation;
    const actAlpha = 0.04 + srcAct * 0.25 + dstAct * 0.2;

    ctx.beginPath();
    ctx.moveTo(conn.from.x, conn.from.y);

    // Curved connections (bezier)
    const midX = (conn.from.x + conn.to.x) / 2;
    const midY = (conn.from.y + conn.to.y) / 2;
    const curveOffset = (conn.from.layer % 2 === 0 ? 1 : -1) * 15 * (1 + scrollDepth);
    ctx.quadraticCurveTo(midX, midY + curveOffset, conn.to.x, conn.to.y);

    ctx.strokeStyle = `rgba(80,140,220,${Math.max(0.03, actAlpha * conn.opacity * 5)})`;
    ctx.lineWidth = 0.4 + Math.max(srcAct, dstAct) * 1.8;
    ctx.stroke();
  });

  // --- DRAW DATA PARTICLES ---
  dataParticles.forEach(p => p.draw(ctx));

  // --- DRAW NEURONS ---
  neurons.forEach(n => {
    const r = n.radius;
    const [cr, cg, cb] = n.baseColor;

    // Outer glow
    if (n.glowRadius > 0) {
      const glowGrad = ctx.createRadialGradient(n.x, n.y, r * 0.5, n.x, n.y, r + n.glowRadius);
      glowGrad.addColorStop(0, `rgba(${cr},${cg},${cb},${0.3 + n.activation * 0.5})`);
      glowGrad.addColorStop(0.5, `rgba(${cr},${cg},${cb},${0.15 + n.activation * 0.2})`);
      glowGrad.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
      ctx.fillStyle = glowGrad;
      ctx.beginPath();
      ctx.arc(n.x, n.y, r + n.glowRadius, 0, TWO_PI);
      ctx.fill();
    }

    // Hover ring
    if (n.hovered) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, r + 8 + Math.sin(time * 0.1) * 2, 0, TWO_PI);
      ctx.strokeStyle = `rgba(${cr},${cg},${cb},0.6)`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // Fire ring
    if (n.firing) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, r + 14 + Math.sin(time * 0.3) * 4, 0, TWO_PI);
      ctx.strokeStyle = `rgba(255,255,255,${n.fireTimer / 30 * 0.8})`;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Neuron body
    const bodyGrad = ctx.createRadialGradient(n.x - r * 0.3, n.y - r * 0.3, r * 0.1, n.x, n.y, r);
    const brightCr = Math.min(255, cr + 80);
    const brightCg = Math.min(255, cg + 80);
    const brightCb = Math.min(255, cb + 80);
    bodyGrad.addColorStop(0, `rgb(${brightCr},${brightCg},${brightCb})`);
    bodyGrad.addColorStop(0.6, `rgb(${cr},${cg},${cb})`);
    bodyGrad.addColorStop(1, `rgb(${Math.floor(cr*0.4)},${Math.floor(cg*0.4)},${Math.floor(cb*0.4)})`);
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, TWO_PI);
    ctx.fill();

    // Neuron border
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, TWO_PI);
    const borderAlpha = 0.3 + n.activation * 0.7;
    ctx.strokeStyle = `rgba(${brightCr},${brightCg},${brightCb},${borderAlpha})`;
    ctx.lineWidth = 0.8;
    ctx.stroke();
  });

  // --- DRAW SIGNAL PULSES ---
  signalPulses.forEach(p => p.draw(ctx));

  // --- DRAW SPARKLES ---
  sparkles.forEach(s => s.draw(ctx));

  // --- LAYER LABELS ---
  LAYER_CONFIG.forEach((cfg, li) => {
    const layerNeurons = neurons.filter(n => n.layer === li);
    if (layerNeurons.length === 0) return;
    const avgX = layerNeurons.reduce((s, n) => s + n.x, 0) / layerNeurons.length;
    const topY = Math.min(...layerNeurons.map(n => n.y)) - 30;

    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.font = '10px "Courier New", monospace';
    ctx.fillStyle = `rgb(${cfg.color[0]},${cfg.color[1]},${cfg.color[2]})`;
    ctx.textAlign = 'center';
    ctx.fillText(cfg.name, avgX, topY);

    // Neuron count per layer
    ctx.globalAlpha = 0.2;
    ctx.font = '9px "Courier New", monospace';
    ctx.fillText(`${cfg.neurons} neurons`, avgX, topY + 14);
    ctx.restore();
  });

  // --- INFO OVERLAY ---
  const totalConns = connections.length;
  const totalNeurons = neurons.length;
  const activeParticles = dataParticles.length;
  info.innerHTML =
    `neurons: ${totalNeurons}<br>` +
    `connections: ${totalConns}<br>` +
    `particles: ${activeParticles}<br>` +
    `fps: ${fps}`;

  requestAnimationFrame(draw);
}

// --- Click handler for firing ---
canvas.addEventListener('click', e => {
  // Find nearest neuron to click point
  let nearest = null;
  let nearestDist = 45;
  neurons.forEach(n => {
    const dx = e.clientX - n.x;
    const dy = e.clientY - n.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < nearestDist) {
      nearestDist = dist;
      nearest = n;
    }
  });
  if (nearest) {
    fireSignal(nearest);
  }
});

draw();
</script>
</body>
</html>
