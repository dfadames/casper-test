<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravity — N-Body Simulator | casper-test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    cursor: crosshair;
    user-select: none;
    -webkit-user-select: none;
  }
  canvas { display: block; }
  #hud {
    position: fixed;
    top: 16px;
    left: 16px;
    color: rgba(255,255,255,0.55);
    font-size: 12px;
    line-height: 1.6;
    pointer-events: none;
    z-index: 10;
  }
  #hud span { color: rgba(255,255,255,0.85); }
  #hint {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    pointer-events: none;
    transition: opacity 0.8s;
    z-index: 10;
  }
  #title {
    position: fixed;
    top: 16px;
    right: 20px;
    font-size: 13px;
    color: rgba(255,255,255,0.3);
    pointer-events: none;
    z-index: 10;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  particles: <span id="count">0</span><br>
  fps: <span id="fps">0</span><br>
  scale: <span id="scale">1.0x</span>
</div>
<div id="hint">🖱️ click to spawn &amp; drag for velocity &nbsp;|&nbsp; scroll to zoom &nbsp;|&nbsp; R to reset &nbsp;|&nbsp; G to toggle grid</div>
<div id="title">gravity.html</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hudCount = document.getElementById('count');
const hudFps = document.getElementById('fps');
const hudScale = document.getElementById('scale');
const hint = document.getElementById('hint');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Simulation state ──────────────────────────
const G = 0.5;
const SOFTENING = 8;
const MERGE_DIST = 6;
const MAX_PARTICLES = 400;
const TRAIL_ALPHA = 0.15;
const DAMPING = 0.998;

let particles = [];
let stars = [];
let scale = 1;
let offsetX = 0, offsetY = 0;
let showGrid = true;
let mouseDown = false;
let mouseX = 0, mouseY = 0;
let dragStartX = 0, dragStartY = 0;
let dragStartTime = 0;

// Trail canvas (separate for persistence)
const trailCanvas = document.createElement('canvas');
const trailCtx = trailCanvas.getContext('2d');

function resizeTrails() {
  trailCanvas.width = W;
  trailCanvas.height = H;
}
resizeTrails();
window.addEventListener('resize', resizeTrails);

// ── Particle class ────────────────────────────
let nextId = 0;
class Particle {
  constructor(x, y, vx = 0, vy = 0, mass = null) {
    this.id = nextId++;
    this.x = x;
    this.y = y;
    this.vx = vx;
    this.vy = vy;
    this.mass = mass || (Math.random() * 3 + 1);
    this.radius = Math.sqrt(this.mass) * 3;
    this.hue = Math.random() * 360;
    this.trail = [];
    this.alive = true;
  }

  update(ax, ay) {
    this.vx += ax;
    this.vy += ay;
    this.vx *= DAMPING;
    this.vy *= DAMPING;
    this.x += this.vx;
    this.y += this.vy;
    // Bounce off edges (world space)
    const margin = this.radius;
    if (this.x < -2000 + margin) { this.x = -2000 + margin; this.vx *= -0.5; }
    if (this.x > 2000 - margin) { this.x = 2000 - margin; this.vx *= -0.5; }
    if (this.y < -2000 + margin) { this.y = -2000 + margin; this.vy *= -0.5; }
    if (this.y > 2000 - margin) { this.y = 2000 - margin; this.vy *= -0.5; }
    // Trail
    this.trail.push({ x: this.x, y: this.y, hue: this.hue, mass: this.mass });
    if (this.trail.length > 40) this.trail.shift();
  }
}

// ── Background stars ──────────────────────────
function initStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.2 + 0.3,
      twinkle: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.02 + 0.005
    });
  }
}
initStars();

// ── Spawn particles ───────────────────────────
function spawnCluster(x, y, count, spreadV = 3) {
  for (let i = 0; i < count; i++) {
    if (particles.length >= MAX_PARTICLES) {
      // Remove oldest particle
      particles.shift();
    }
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * spreadV;
    const p = new Particle(x, y, Math.cos(angle) * speed, Math.sin(angle) * speed);
    particles.push(p);
  }
  if (count > 1) hint.style.opacity = '0';
}

// ── Reset ─────────────────────────────────────
function reset() {
  particles = [];
  trailCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
  scale = 1;
  offsetX = 0;
  offsetY = 0;
  // Spawn initial system
  const cx = 0, cy = 0;
  // Central large mass
  particles.push(new Particle(cx, cy, 0, 0, 20));
  particles[0].hue = 40; // golden sun
  // Orbiting bodies
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2 + Math.random() * 0.3;
    const dist = 100 + Math.random() * 250;
    const px = cx + Math.cos(angle) * dist;
    const py = cy + Math.sin(angle) * dist;
    const orbitalSpeed = Math.sqrt(G * 20 / dist) * 0.8;
    const vx = -Math.sin(angle) * orbitalSpeed;
    const vy = Math.cos(angle) * orbitalSpeed;
    const p = new Particle(px, py, vx, vy, Math.random() * 2 + 0.5);
    p.hue = (i * 45 + 180) % 360;
    particles.push(p);
  }
  // Scattered dust
  for (let i = 0; i < 30; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 200 + Math.random() * 400;
    const px = cx + Math.cos(angle) * dist;
    const py = cy + Math.sin(angle) * dist;
    const orbitalSpeed = Math.sqrt(G * 20 / dist) * 0.7;
    const vx = -Math.sin(angle) * orbitalSpeed + (Math.random() - 0.5) * 1;
    const vy = Math.cos(angle) * orbitalSpeed + (Math.random() - 0.5) * 1;
    const p = new Particle(px, py, vx, vy, Math.random() * 0.8 + 0.1);
    p.hue = Math.random() * 360;
    particles.push(p);
  }
  hudCount.textContent = particles.length;
  hint.style.opacity = '1';
}

// ── Gravity calculation ───────────────────────
function computeGravity() {
  for (let i = 0; i < particles.length; i++) {
    let ax = 0, ay = 0;
    const pi = particles[i];
    for (let j = 0; j < particles.length; j++) {
      if (i === j) continue;
      const pj = particles[j];
      let dx = pj.x - pi.x;
      let dy = pj.y - pi.y;
      const distSq = dx * dx + dy * dy + SOFTENING * SOFTENING;
      const dist = Math.sqrt(distSq);
      const force = G * pj.mass / distSq;
      ax += force * dx / dist;
      ay += force * dy / dist;

      // Merge check
      if (dist < MERGE_DIST && pi.mass >= pj.mass && pi.id !== pj.id && pj.alive) {
        // Conservation of momentum
        pi.vx = (pi.vx * pi.mass + pj.vx * pj.mass) / (pi.mass + pj.mass);
        pi.vy = (pi.vy * pi.mass + pj.vy * pj.mass) / (pi.mass + pj.mass);
        pi.mass += pj.mass;
        pi.radius = Math.sqrt(pi.mass) * 3;
        pi.hue = (pi.hue + pj.hue) / 2;
        pj.alive = false;
      }
    }
    pi.update(ax, ay);
  }
  // Remove dead particles
  particles = particles.filter(p => p.alive);
}

// ── Rendering ─────────────────────────────────
function worldToScreen(wx, wy) {
  return {
    x: (wx - offsetX) * scale + W / 2,
    y: (wy - offsetY) * scale + H / 2
  };
}

function screenToWorld(sx, sy) {
  return {
    x: (sx - W / 2) / scale + offsetX,
    y: (sy - H / 2) / scale + offsetY
  };
}

function drawGrid() {
  if (!showGrid) return;
  const gridSize = 100;
  const alpha = Math.min(0.08, scale * 0.02);
  ctx.strokeStyle = `rgba(80, 100, 160, ${alpha})`;
  ctx.lineWidth = 0.5;

  const topLeft = screenToWorld(0, 0);
  const botRight = screenToWorld(W, H);

  const startX = Math.floor(topLeft.x / gridSize) * gridSize;
  const startY = Math.floor(topLeft.y / gridSize) * gridSize;

  for (let wx = startX; wx <= botRight.x; wx += gridSize) {
    const s = worldToScreen(wx, 0);
    ctx.beginPath();
    ctx.moveTo(s.x, 0);
    ctx.lineTo(s.x, H);
    ctx.stroke();
  }
  for (let wy = startY; wy <= botRight.y; wy += gridSize) {
    const s = worldToScreen(0, wy);
    ctx.beginPath();
    ctx.moveTo(0, s.y);
    ctx.lineTo(W, s.y);
    ctx.stroke();
  }
}

function draw(time) {
  computeGravity();

  // Clear main canvas
  ctx.clearRect(0, 0, W, H);

  // Fade trail canvas
  trailCtx.fillStyle = `rgba(0, 0, 0, ${TRAIL_ALPHA})`;
  trailCtx.fillRect(0, 0, trailCanvas.width, trailCanvas.height);

  // Draw trails onto trail canvas
  for (const p of particles) {
    if (p.trail.length < 2) continue;
    trailCtx.beginPath();
    const s0 = worldToScreen(p.trail[0].x, p.trail[0].y);
    trailCtx.moveTo(s0.x, s0.y);
    for (let i = 1; i < p.trail.length; i++) {
      const s = worldToScreen(p.trail[i].x, p.trail[i].y);
      trailCtx.lineTo(s.x, s.y);
    }
    const alpha = 0.3 + (p.mass / 20) * 0.4;
    trailCtx.strokeStyle = `hsla(${p.hue}, 70%, 60%, ${alpha})`;
    trailCtx.lineWidth = p.radius * scale * 0.6;
    trailCtx.lineCap = 'round';
    trailCtx.stroke();
  }

  // Composite trail canvas onto main
  ctx.drawImage(trailCanvas, 0, 0);

  // Draw grid
  drawGrid();

  // Draw particles
  for (const p of particles) {
    const s = worldToScreen(p.x, p.y);
    const r = Math.max(1.5, p.radius * scale);

    // Outer glow
    const glow = ctx.createRadialGradient(s.x, s.y, r * 0.2, s.x, s.y, r * 2.5);
    glow.addColorStop(0, `hsla(${p.hue}, 80%, 70%, 0.9)`);
    glow.addColorStop(0.4, `hsla(${p.hue}, 70%, 50%, 0.4)`);
    glow.addColorStop(1, `hsla(${p.hue}, 60%, 40%, 0)`);
    ctx.beginPath();
    ctx.arc(s.x, s.y, r * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();

    // Core
    const core = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, r);
    core.addColorStop(0, `hsla(${p.hue}, 30%, 95%, 1)`);
    core.addColorStop(0.5, `hsla(${p.hue}, 70%, 65%, 0.8)`);
    core.addColorStop(1, `hsla(${p.hue}, 80%, 45%, 0)`);
    ctx.beginPath();
    ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
    ctx.fillStyle = core;
    ctx.fill();
  }

  // Draw drag indicator
  if (mouseDown) {
    const world = screenToWorld(mouseX, mouseY);
    const start = screenToWorld(dragStartX, dragStartY);
    const s = worldToScreen(start.x, start.y);
    ctx.beginPath();
    ctx.moveTo(dragStartX, dragStartY);
    ctx.lineTo(mouseX, mouseY);
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 4]);
    ctx.stroke();
    ctx.setLineDash([]);

    // Spawn preview
    ctx.beginPath();
    ctx.arc(dragStartX, dragStartY, 6, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fill();
  }

  // Stats
  hudCount.textContent = particles.length;
  hudScale.textContent = scale.toFixed(1) + 'x';
}

// ── FPS tracking ──────────────────────────────
let frames = 0, lastFpsTime = performance.now();
function gameLoop(time) {
  draw(time);
  frames++;
  if (time - lastFpsTime >= 1000) {
    hudFps.textContent = frames;
    frames = 0;
    lastFpsTime = time;
  }
  requestAnimationFrame(gameLoop);
}

// ── Input ─────────────────────────────────────
canvas.addEventListener('mousedown', e => {
  mouseDown = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  dragStartTime = performance.now();
});

canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

canvas.addEventListener('mouseup', e => {
  if (!mouseDown) return;
  mouseDown = false;
  const dx = e.clientX - dragStartX;
  const dy = e.clientY - dragStartY;
  const elapsed = performance.now() - dragStartTime;
  const w = screenToWorld(dragStartX, dragStartY);
  const vx = dx / scale * 0.08;
  const vy = dy / scale * 0.08;

  // If quick click with little movement, spawn cluster
  if (Math.abs(dx) < 5 && Math.abs(dy) < 5 && elapsed < 300) {
    spawnCluster(w.x, w.y, 5 + Math.floor(Math.random() * 8), 2);
  } else {
    // Spawn with velocity
    if (particles.length >= MAX_PARTICLES) particles.shift();
    const mass = Math.min(Math.abs(dx) + Math.abs(dy), 800) / 80 + 1;
    const p = new Particle(w.x, w.y, vx, vy, mass);
    p.hue = Math.atan2(dy, dx) * 180 / Math.PI + 180;
    particles.push(p);
  }
  hudCount.textContent = particles.length;
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale = Math.max(0.1, Math.min(10, scale * zoomFactor));
  // Zoom toward cursor
  const worldBefore = screenToWorld(e.clientX, e.clientY);
  scale = newScale;
  const worldAfter = screenToWorld(e.clientX, e.clientY);
  offsetX += worldBefore.x - worldAfter.x;
  offsetY += worldBefore.y - worldAfter.y;
}, { passive: false });

// Touch support
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  mouseDown = true;
  dragStartX = t.clientX;
  dragStartY = t.clientY;
  dragStartTime = performance.now();
  mouseX = t.clientX;
  mouseY = t.clientY;
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  mouseX = t.clientX;
  mouseY = t.clientY;
});

canvas.addEventListener('touchend', e => {
  if (!mouseDown) return;
  mouseDown = false;
  const dx = mouseX - dragStartX;
  const dy = mouseY - dragStartY;
  const w = screenToWorld(dragStartX, dragStartY);
  const vx = dx / scale * 0.08;
  const vy = dy / scale * 0.08;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) {
    spawnCluster(w.x, w.y, 3 + Math.floor(Math.random() * 5), 1.5);
  } else {
    if (particles.length >= MAX_PARTICLES) particles.shift();
    const mass = Math.min(Math.abs(dx) + Math.abs(dy), 400) / 80 + 0.5;
    const p = new Particle(w.x, w.y, vx, vy, mass);
    p.hue = Math.atan2(dy, dx) * 180 / Math.PI + 180;
    particles.push(p);
  }
  hudCount.textContent = particles.length;
});

// Keyboard
window.addEventListener('keydown', e => {
  switch (e.key.toLowerCase()) {
    case 'r': reset(); break;
    case 'g': showGrid = !showGrid; break;
    case 'f': 
      // Find most massive particle and center on it
      if (particles.length > 0) {
        let biggest = particles[0];
        for (const p of particles) if (p.mass > biggest.mass) biggest = p;
        offsetX = biggest.x;
        offsetY = biggest.y;
      }
      break;
  }
});

// ── Start ─────────────────────────────────────
reset();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
